apiVersion: apps/v1
kind: Deployment
metadata:
  name: communitypulse-api
  labels:
    app: communitypulse-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: communitypulse-api
  template:
    metadata:
      labels:
        app: communitypulse-api
    spec:
      containers:
      - name: api
        image: gcr.io/communitypulse-ai-demo/communitypulse-api:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
